services:
  - name: wyr
    type: web
    runtime: node
    plan: free
    buildCommand: |
      set -e
      npm --prefix shared install --include=dev
      npm --prefix shared run build
      npm --prefix frontend install --include=dev
      npm --prefix frontend run build
      npm --prefix backend install --include=dev
      npm --prefix backend run build
    startCommand: node backend/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
